name: Update Packages

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  update-homebrew:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Download and hash release
        id: release
        run: |
          VERSION="${{ github.event.release.tag_name || github.ref_name }}"
          curl -L -o vibe_stream-macos.dmg \
            "https://github.com/${{ github.repository }}/releases/download/$VERSION/vibe_stream-macos.dmg"
          SHA256=$(shasum -a 256 vibe_stream-macos.dmg | cut -d' ' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT

      - name: Update cask
        run: |
          sed -i '' "s/version \".*\"/version \"${{ steps.release.outputs.version }}\"/" Casks/vibe_stream.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${{ steps.release.outputs.sha256 }}\"/" Casks/vibe_stream.rb

      - name: Commit
        run: |
          BRANCH="${{ github.event.repository.default_branch }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/vibe_stream.rb
          if ! git diff --staged --quiet; then
            git commit -m "chore: update cask to ${{ steps.release.outputs.version }}"
            git push origin "HEAD:$BRANCH"
          else
            echo "No cask changes to commit."
          fi

  # TODO: WinGet publishing is disabled pending a Vibe WinGet listing.
  # The upstream entry `edde746.Plezy` belongs to Plezy and must not be
  # used. To re-enable, submit a new manifest under (for example)
  # `MazeDev7.Vibe` to microsoft/winget-pkgs, set up a fork + PAT
  # (WINGET_TOKEN), then uncomment this job and update `identifier`.
  #
  # update-winget:
  #   runs-on: windows-latest
  #   steps:
  #     - uses: vedantmgoyal9/winget-releaser@v2
  #       with:
  #         identifier: MazeDev7.Vibe
  #         installers-regex: 'vibe_stream-windows-installer\.exe$'
  #         token: ${{ secrets.WINGET_TOKEN }}

  update-appcast-branch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download appcast.xml from release
        run: |
          gh release download "${{ github.event.release.tag_name }}" \
            --pattern "appcast.xml"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to appcast branch
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BLOB=$(git hash-object -w appcast.xml)
          TREE=$(printf "100644 blob %s\tappcast.xml\n" "$BLOB" | git mktree)
          COMMIT=$(git commit-tree "$TREE" -m "Update appcast for $VERSION")
          git push origin "$COMMIT:refs/heads/appcast" --force
