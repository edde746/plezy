name: VibeStream
options:
  bundleIdPrefix: com.amaze.vibestream
  deploymentTarget:
    tvOS: "17.0"
  xcodeVersion: "15.4"
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: MRF7ZX8DD9
    CODE_SIGN_STYLE: Automatic

packages:
  MPVKit:
    url: https://github.com/MazeDev7/MPVKitAM
    revision: 42dcc3123000361d0be54fbaec981043b77e1e05
  VLCKitSPM:
    url: https://github.com/MazeDev7/vlckit-spm
    from: 3.5.1

targets:
  VibeStream:
    type: application
    platform: tvOS
    sources:
      - path: VibeStream
        excludes:
          - TopShelf
      - path: Shared/apple/MpvPlayer
        excludes:
          - MpvPlayerPluginShared.swift
    resources:
      - path: VibeStream/Resources
    dependencies:
      - package: MPVKit
        product: MPVKit
      - package: VLCKitSPM
        product: VLCKitSPM
      - target: VibeStreamTopShelf
        embed: true
      - sdk: AVKit.framework
      - sdk: AVFoundation.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.amaze.vibestream
        INFOPLIST_FILE: VibeStream/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: "Vibe"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_KEY_UIUserInterfaceStyle: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: NO
        SWIFT_EMIT_LOC_STRINGS: YES
    entitlements:
      path: VibeStream/VibeStream.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.amaze.vibestream

  VibeStreamTopShelf:
    type: app-extension
    platform: tvOS
    sources:
      - path: VibeStream/TopShelf
      - path: VibeStream/Models
      - path: VibeStream/Services/PlexClient.swift
      - path: VibeStream/Services/KeychainService.swift
      - path: VibeStream/Services/ImageLoader.swift
      - path: VibeStream/Extensions
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.amaze.vibestream.topshelf
        INFOPLIST_FILE: VibeStream/TopShelf/Info.plist
        GENERATE_INFOPLIST_FILE: YES
    entitlements:
      path: VibeStream/TopShelf/TopShelf.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.amaze.vibestream

  VibeStreamTests:
    type: bundle.unit-test
    platform: tvOS
    sources:
      - path: VibeStreamTests
    dependencies:
      - target: VibeStream
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.amaze.vibestream.tests
        GENERATE_INFOPLIST_FILE: YES

  VibeStreamUITests:
    type: bundle.ui-testing
    platform: tvOS
    sources:
      - path: VibeStreamUITests
    dependencies:
      - target: VibeStream
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.amaze.vibestream.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: VibeStream

schemes:
  VibeStream:
    build:
      targets:
        VibeStream: all
        VibeStreamTopShelf: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - VibeStreamTests
        - VibeStreamUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
